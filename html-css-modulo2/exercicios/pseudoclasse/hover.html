<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        div > p{
            display: none;
        }
        div:hover > p {
            display: block;
            color: red;
            background-color: aquamarine;
            text-align: center;
        }
        div:hover{
            color: blue;
        }

    </style>
</head>
<body>
    <h1>Exemplo de Hover</h1>
    <p>Passe o mouse sobre este texto para ver o efeito de hover.</p>
    <div>
        Passe o mouse sobre este parágrafo
        <p>Texto Escondido</p>
    </div>
    
</body>
</html>
