<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixas</title>

 <style>
   h1{

    
    background-color: aliceblue;
    height: 300px;
    width: 300px;
    border-width: 5px;
    border-style: solid;
    border-color: black;
    
    border: 10px solid black;

    padding-top: 10px;
    padding-right: 10px;
    padding-bottom: 10px;
    padding-left: 10px;
    margin-top: 20px;

    padding: 80px 9px 9px 9px;
    background-color: lightslategray;

    margin-bottom: 40px;
    margin: 20px auto 40px auto;
   

   }

   a{
    background-color: lightsteelblue;
    height: 50px;
    width: 50px;

    border-width: 5px;
    border-style: solid;
    border-color: black;

    padding:30px 30px 30px 30px ;

    margin: 20px 20px 20px 20px;
   }
 </style>

</head>
<body>
 <h1>Modelos de Caixas Box-level</h1>
 <p>Paragrafos também são exemplos de box-level, mas <a href="#">os links são elementos inline-level</a>. Vamos ver como isso tudo funciona.</p>
    
</body>
</html>
